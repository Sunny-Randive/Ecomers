name: E-Commerce Platform CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (Compile and Test)
        run: mvn clean test

  docker-build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Compile JARs with Maven (No Tests)
        run: mvn clean package -DskipTests

      - name: Build and Push Frontend Image
        run: |
          if [ "$DOCKER_USERNAME" != "" ]; then
            echo "Building and pushing image for frontend..."
            docker build -t "$DOCKER_USERNAME/ecom-frontend:latest" ./ecom-frontend
            docker push "$DOCKER_USERNAME/ecom-frontend:latest"
          else
            echo "Building local image for frontend..."
            docker build -t ecom-frontend:latest ./ecom-frontend
            echo "Skipping push because DOCKER_USERNAME is not set."
          fi

      - name: Build and Push Microservices Images
        run: |
          services=("config-server" "discovery-server" "api-gateway" "auth-service" "user-service" "product-service" "inventory-service" "cart-service" "order-service" "payment-service" "notification-service")
          for service in "${services[@]}"; do
            if [ "$DOCKER_USERNAME" != "" ]; then
              echo "Building and pushing image for $service..."
              docker build -t "$DOCKER_USERNAME/ecom-$service:latest" ./$service
              docker push "$DOCKER_USERNAME/ecom-$service:latest"
            else
              echo "Building local image for $service..."
              docker build -t ecom-$service:latest ./$service
              echo "Skipping push because DOCKER_USERNAME is not set."
            fi
          done

  deploy-to-vm:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VM_IP: ${{ secrets.VM_IP }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
    steps:
      - name: SSH and Deploy to VM
        if: ${{ env.VM_IP != '' && env.VM_USER != '' && env.VM_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/Ecomers
            git pull origin main
            sudo docker compose up -d --build
            sleep 15
            sudo docker compose ps
            sudo docker compose logs order-service
