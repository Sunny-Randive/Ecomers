apiVersion: v1
kind: Secret
metadata:
  name: ecom-secrets
type: Opaque
data:
  # Base64 encoded passwords: "password"
  db-password: cGFzc3dvcmQ=
  # Base64 encoded JWT secret key
  jwt-secret: NDA0RTYzNTI2NjU1NkE1ODZOMzcyMzU3NTM4NzgyRjQxM0Y0NDI4NDcyQjRCNjI1MDZkNTM2NzU2NkI1OTcw
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ecom-configmap
data:
  DB_HOST: "ecom-postgres"
  DB_USER: "postgres"
  REDIS_HOST: "ecom-redis"
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: "ecom-kafka:9092"
  CONFIG_SERVER_URL: "http://ecom-config-server:8888"
  EUREKA_SERVER_URL: "http://ecom-discovery-server:8761/eureka/"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# PostgreSQL Stateful Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecom-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecom-postgres
  template:
    metadata:
      labels:
        app: ecom-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecom-secrets
                  key: db-password
            - name: POSTGRES_DB
              value: ecom_master
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ecom-postgres
spec:
  ports:
    - port: 5432
  selector:
    app: ecom-postgres
---
# Redis Cache Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecom-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecom-redis
  template:
    metadata:
      labels:
        app: ecom-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: ecom-redis
spec:
  ports:
    - port: 6379
  selector:
    app: ecom-redis
---
# ZooKeeper Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecom-zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecom-zookeeper
  template:
    metadata:
      labels:
        app: ecom-zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.4.0
          ports:
            - containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
---
apiVersion: v1
kind: Service
metadata:
  name: ecom-zookeeper
spec:
  ports:
    - port: 2181
  selector:
    app: ecom-zookeeper
---
# Kafka Broker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecom-kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecom-kafka
  template:
    metadata:
      labels:
        app: ecom-kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.4.0
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "ecom-zookeeper:2181"
            - name: KAFKA_ADVERTISED_LISTENERS:
              value: "PLAINTEXT://ecom-kafka:9092"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: ecom-kafka
spec:
  ports:
    - port: 9092
  selector:
    app: ecom-kafka
