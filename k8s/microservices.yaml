# Config Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecom-config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecom-config-server
  template:
    metadata:
      labels:
        app: ecom-config-server
    spec:
      containers:
        - name: config-server
          image: ecom-config-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: native
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ecom-config-server
spec:
  ports:
    - port: 8888
  selector:
    app: ecom-config-server
---
