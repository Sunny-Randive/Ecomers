# API Gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecom-api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecom-api-gateway
  template:
    metadata:
      labels:
        app: ecom-api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ecom-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_CONFIG_IMPORT
              valueFrom:
                configMapKeyRef:
                  name: ecom-configmap
                  key: CONFIG_SERVER_URL
            - name: EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: ecom-configmap
                  key: EUREKA_SERVER_URL
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ecom-api-gateway
spec:
  ports:
    - port: 8080
  selector:
    app: ecom-api-gateway
---
