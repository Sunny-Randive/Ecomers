version: '3.8'

services:
  # Database Service
  postgres:
    image: postgres:15-alpine
    container_name: ecom-postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecom_master
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecom_master"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Message Broker
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: ecom-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx128m -Xms128m"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - ecom-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: ecom-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms256m"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Config Server
  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: ecom-config-server
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: native
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:ActiveProcessorCount=1"
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Discovery Server (Eureka)
  discovery-server:
    build:
      context: ./discovery-server
      dockerfile: Dockerfile
    container_name: ecom-discovery-server
    ports:
      - "8761:8761"
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:ActiveProcessorCount=1"
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: ecom-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:ActiveProcessorCount=1"
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - ecom-network

  # Auth Service
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: ecom-auth-service
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      DB_HOST: postgres
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:ActiveProcessorCount=1"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - ecom-network

  # User Service
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: ecom-user-service
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      DB_HOST: postgres
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:ActiveProcessorCount=1"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - ecom-network

  # Product Service
  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: ecom-product-service
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      DB_HOST: postgres
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:ActiveProcessorCount=1"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - ecom-network

  # Inventory Service
  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: ecom-inventory-service
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      DB_HOST: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:ActiveProcessorCount=1"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - ecom-network

  # Cart Service
  cart-service:
    build:
      context: ./cart-service
      dockerfile: Dockerfile
    container_name: ecom-cart-service
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      DB_HOST: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:ActiveProcessorCount=1"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - ecom-network

  # Order Service
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: ecom-order-service
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      DB_HOST: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:ActiveProcessorCount=1"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - ecom-network

  # Payment Service
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: ecom-payment-service
    ports:
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      DB_HOST: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:ActiveProcessorCount=1"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - ecom-network

  # Notification Service
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: ecom-notification-service
    ports:
      - "8088:8088"
    depends_on:
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:ActiveProcessorCount=1"
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - ecom-network

  # Observability - Prometheus
  prometheus:
    image: prom/prometheus:v2.44.0
    container_name: ecom-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheusdata:/prometheus
    networks:
      - ecom-network

  # Observability - Grafana
  grafana:
    image: grafana/grafana:9.5.2
    container_name: ecom-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ecom-network

  # Frontend Service
  frontend:
    build:
      context: ./ecom-frontend
      dockerfile: Dockerfile
    container_name: ecom-frontend
    ports:
      - "8089:80"
    depends_on:
      - api-gateway
    networks:
      - ecom-network

volumes:
  pgdata:
  redisdata:
  prometheusdata:
  grafanadata:

networks:
  ecom-network:
    driver: bridge
